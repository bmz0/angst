<fieldset>
  <legend>Comb Filter</legend>
  <label>
    <input
      type="checkbox"
      [checked]="combFilterEnabled()"
      (change)="toggleFilter()">
    Enable
  </label>

  @if (combFilterEnabled()) {
    <label>
      Delay:
      <input
        type="range"
        min="0.00005"
        max="0.02"
        step="0.00001"
        [value]="combFilterDelayTime()"
        (input)="onDelayTimeChange(+$any($event.target).value)">
      <span>{{ combFrequency() }}</span>
    </label>

    <label>
      Gain:
      <input
        type="range"
        min="-1"
        max="1"
        step="0.01"
        [value]="combFilterGain()"
        (input)="onGainChange(+$any($event.target).value)">
      <span>{{ combFilterGain().toFixed(2) }}</span>
    </label>

    <label>
      <input
        type="checkbox"
        [checked]="combFilterFeedback()"
        (change)="toggleFeedback()">
      Feedback
    </label>

    <label>
      Post Gain:
      <input
        type="range"
        min="0"
        max="2"
        step="0.01"
        [value]="combFilterPostGain()"
        (input)="onPostGainChange(+$any($event.target).value)">
      <span>{{ (combFilterPostGain() * 100).toFixed(0) }}%</span>
    </label>

    <label>
      Keyboard Tracking:
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [value]="combFilterKeyboardTracking()"
        (input)="onKeyboardTrackingChange(+$any($event.target).value)">
      <span>{{ (combFilterKeyboardTracking() * 100).toFixed(0) }}%</span>
    </label>
  }
</fieldset>
