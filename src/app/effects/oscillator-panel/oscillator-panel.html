<div class="oscillator-section">
  <h3>Oscillator 1</h3>
  <oscillator-selector [(selectedType)]="oscillator1Type"></oscillator-selector>

  <label>
   <span>{{ ((1 - oscillatorMix()) * 100).toFixed(0) }}% </span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      [value]="oscillatorMix()"
      (input)="onOscillatorMixChange(+$any($event.target).value)">
    <span>{{ (oscillatorMix() * 100).toFixed(0) }}%</span>
  </label>

  <oscillator-selector [(selectedType)]="oscillator2Type"></oscillator-selector>
  <h3>Oscillator 2</h3>
</div>

<div class="oscillator-section">
  <fieldset class="oscillator-controls">
    <legend>Oscillator 2</legend>
    <label for="oscillator2-sub-octave">
      <input
        type="checkbox"
        id="oscillator2-sub-octave"
        [checked]="oscillator2SubOctave()"
        (change)="toggleOscillator2SubOctave()"
      >Sub-Octave
    </label>

    <label for="oscillator2-invert">
      <input
        type="checkbox"
        id="oscillator2-invert"
        [checked]="oscillator2Invert()"
        (change)="onOscillator2InvertChange()"
      >Invert
    </label>
  </fieldset>

  <fieldset class="voice-controls">
    <legend>Polyphony</legend>
    <div class="polyphony-selector">
      @for (mode of polyphonyModes; track mode) {
        <button
          type="button"
          class="polyphony-btn"
          [class.polyphony-btn--active]="polyphonyMode() === mode"
          (click)="onPolyphonyModeChange(mode)">
          {{ mode }}
        </button>
      }
    </div>
    @if (polyphonyMode() === 'mono') {
      <label>
        Glide:
        <input
          type="range"
          min="0"
          max="0.5"
          step="0.001"
          [value]="glideTime()"
          (input)="onGlideTimeChange(+$any($event.target).value)">
        <span>{{ glideTime() * 1000 }}ms</span>
      </label>
    }
  </fieldset>
  <ng-content></ng-content>
</div>
