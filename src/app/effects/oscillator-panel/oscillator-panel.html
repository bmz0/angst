<div class="oscillator-section">
  <h3>Oscillator 1</h3>
  <oscillator-selector [(selectedType)]="oscillator1Type"></oscillator-selector>

  <label>
   <span>{{ ((1 - oscillatorMix()) * 100).toFixed(0) }}% </span>
    <input
      type="range"
      min="0"
      max="1"
      step="0.01"
      [value]="oscillatorMix()"
      (input)="onOscillatorMixChange(+$any($event.target).value)">
    <span>{{ (oscillatorMix() * 100).toFixed(0) }}%</span>
  </label>

  <oscillator-selector [(selectedType)]="oscillator2Type"></oscillator-selector>
  <h3>Oscillator 2</h3>
</div>

<div class="oscillator-section">
  <label>
    Glide:
    <input
      type="range"
      min="0"
      max="1"
      step="0.001"
      [value]="glideTime()"
      (input)="onGlideTimeChange(+$any($event.target).value)">
    <span>{{ glideTime() * 1000 }}ms</span>
  </label>

  <div class="oscillator-controls">
    <fieldset>
      <legend>Oscillator 2</legend>
      <label for="oscillator2-sub-octave">Sub-Octave
        <input
          type="checkbox"
          id="oscillator2-sub-octave"
          [checked]="oscillator2SubOctave()"
          (change)="toggleOscillator2SubOctave()"
        />
      </label>

      <label for="oscillator2-invert">Invert
        <input
          type="checkbox"
          id="oscillator2-invert"
          [checked]="oscillator2Invert()"
          (change)="onOscillator2InvertChange()"
        />
      </label>
    </fieldset>
  </div>
</div>
