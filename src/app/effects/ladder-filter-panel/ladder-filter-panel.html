<fieldset>
  <legend>Ladder Filter</legend>
  <label>
    <input
      type="checkbox"
      [checked]="ladderFilterEnabled()"
      (change)="toggleFilter()">
    Enable
  </label>

  @if (ladderFilterEnabled()) {
    <label>
      Frequency:
      <input
        type="range"
        min="20"
        max="12000"
        step="1"
        [value]="ladderFilterFrequency()"
        (input)="onFrequencyChange(+$any($event.target).value)">
      <span>{{ ladderFilterFrequency().toFixed(0) }}Hz</span>
    </label>

    <label>
      Resonance:
      <input
        type="range"
        min="0"
        max="4"
        step="0.01"
        [value]="ladderFilterResonance()"
        (input)="onResonanceChange(+$any($event.target).value)">
      <span>{{ ladderFilterResonance().toFixed(2) }}</span>
    </label>

    <label>
      Drive:
      <input
        type="range"
        min="0.5"
        max="10"
        step="0.1"
        [value]="ladderFilterDrive()"
        (input)="onDriveChange(+$any($event.target).value)">
      <span>{{ ladderFilterDrive().toFixed(1) }}x</span>
    </label>

    <label>
      Keyboard Tracking:
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [value]="ladderFilterKeyboardTracking()"
        (input)="onKeyboardTrackingChange(+$any($event.target).value)">
      <span>{{ (ladderFilterKeyboardTracking() * 100).toFixed(0) }}%</span>
    </label>

    <label>
      Post Gain:
      <input
        type="range"
        min="0"
        max="1"
        step="0.01"
        [value]="ladderFilterPostGain()"
        (input)="onPostGainChange(+$any($event.target).value)">
      <span>{{ (ladderFilterPostGain() * 100).toFixed(0) }}%</span>
    </label>
  }
</fieldset>
