<div class="lfo-container">
  <!-- LFO 1 -->
  <fieldset>
    <legend>LFO 1</legend>
    <label>
      <input
        type="checkbox"
        [checked]="lfo1Enabled()"
        (change)="toggleLfo1Enabled()">
      Enable
    </label>

    @if (lfo1Enabled()) {
      <label>
        Target:
        <select
          [value]="lfo1Target()"
          (change)="onLfo1TargetChange($event)">
          @for (t of lfo1Targets; track t.value) {
            <option [value]="t.value">{{ t.label }}</option>
          }
        </select>
      </label>

      <label>
        Shape:
        <select
          [value]="lfo1Shape()"
          (change)="onLfo1ShapeChange($event)">
          @for (shape of lfoShapes; track shape) {
            <option [value]="shape">{{ shape }}</option>
          }
        </select>
      </label>

      <label>
        Rate:
        <input
          type="range"
          min="0.1"
          max="20"
          step="0.1"
          [value]="lfo1Rate()"
          (input)="onLfo1RateChange(+$any($event.target).value)">
        <span>{{ lfo1Rate().toFixed(1) }} Hz</span>
      </label>

      <label>
        Depth:
        <input
          type="range"
          min="0"
          [max]="depthMax[lfo1Target()]"
          [step]="depthMax[lfo1Target()] <= 1 ? 0.01 : 1"
          [value]="lfo1Depth()"
          (input)="onLfo1DepthChange(+$any($event.target).value)">
        <span>{{ lfo1Depth() % 1 === 0 ? lfo1Depth().toFixed(0) : lfo1Depth().toFixed(2) }}{{ depthUnit[lfo1Target()] }}</span>
      </label>

      <div class="lfo-indicator" [title]="lfo1Indicator().currentValueLabel">
        <div class="lfo-indicator__band"
          [style.left.%]="lfo1Indicator().bandLeftPercent"
          [style.width.%]="lfo1Indicator().bandWidthPercent">
        </div>
        <div class="lfo-indicator__cursor"
          [style.left.%]="lfo1Indicator().cursorPercent">
        </div>
      </div>
      <span class="lfo-indicator__label">{{ lfo1Indicator().currentValueLabel }}</span>

      <label>
        <input
          type="checkbox"
          [checked]="lfo1Retrigger()"
          (change)="toggleLfo1Retrigger()">
        Retrigger on Note
      </label>

      <label>
        Fade In:
        <input
          type="range"
          min="0"
          max="2"
          step="0.1"
          [value]="lfo1FadeIn()"
          (input)="onLfo1FadeInChange(+$any($event.target).value)">
        <span>{{ lfo1FadeIn() === 0 ? 'Off' : lfo1FadeIn().toFixed(1) + ' s' }}</span>
      </label>
    }
  </fieldset>
