<div class="oscillator-type-selector">
  @for (type of oscillatorTypes; track type.value) {
    <label class="type-option">
      <input 
        type="radio" 
        name="oscillatorType" 
        [value]="type.value" 
        [checked]="selectedType === type.value"
        (change)="oscillatorType = type.value; onTypeChange()" />
      <svg width="24" height="24" viewBox="0 0 24 24">
        <path [attr.d]="type.path" fill="none" stroke="currentColor" stroke-width="2" />
      </svg>
      <span>{{ type.label }}</span>
    </label>
  }
</div>
