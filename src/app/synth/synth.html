<div class="synth-container">
  <div class="oscillator-controls">
    <oscillator-panel>
      <rectifier-panel></rectifier-panel>
      <overdrive-panel></overdrive-panel>
    </oscillator-panel>
    <fieldset class="visualizer" role="presentation">
      <legend>Output</legend>
      <osc-visualizer data-label="Output"></osc-visualizer>
    </fieldset>
  </div>
  
  <div class="effects-controls">
    <filter-panel></filter-panel>
    <ladder-filter-panel></ladder-filter-panel>
    <envelope-panel></envelope-panel>
    <delay-panel></delay-panel>
    <reverb-panel></reverb-panel>
    <arpeggiator-panel (stoppedWhilePlaying)="onArpeggiatorStoppedWhilePlaying()"></arpeggiator-panel>
    <lfo-panel></lfo-panel>
  </div>

  <div class="keyb-osc">
    <piano-keyboard
      [(currentOctave)]="currentOctave"
      (notePressed)="play($event.note, $event.octaveOffset)"
      (noteReleased)="stop($event.note, $event.octaveOffset)"
      (octaveChanged)="onOctaveChanged($event)"
      (oscillatorTypeToggled)="toggleOscillatorType()">
    </piano-keyboard>
  </div>
</div>
