<button (click)="init()">Initialize Audio</button>
<br>
<osc-visualizer [analyser]="analyser"></osc-visualizer>
<br>
<oscillator-type-selector 
  [(oscillatorType)]="oscillatorType" 
  (oscillatorTypeChange)="onOscillatorTypeChange()">
</oscillator-type-selector>
<br>
<piano-keyboard 
  [currentOctave]="currentOctave"
  (notePressed)="play($event.note, $event.octaveOffset)"
  (noteReleased)="stop()"
  (octaveChanged)="currentOctave = $event"
  (oscillatorTypeToggled)="toggleOscillatorType()">
</piano-keyboard>
<br>
<label>Gain <input type="range" min="0" max="1" step="0.01" [(ngModel)]="gain" (ngModelChange)="onGainChange()" /></label>
<br>
<label>Glide Time <input type="range" min="0" max="0.5" step="0.01" [(ngModel)]="glideTime" /></label>
<br>
Octave: {{ currentOctave }}
