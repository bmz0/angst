<div class="synth-container">
  <div class="oscillator-controls">
    <div class="oscillator-section">
      <h3>Oscillator 1</h3>
      <oscillator-selector
        [selectedType]="oscillator1Type()"
        (typeSelected)="onOscillator1TypeSelected($event)">
      </oscillator-selector>
      
      <label>
        Glide:
        <input 
          type="range" 
          min="0" 
          max="1" 
          step="0.001"
          [value]="glideTime()"
          (input)="onGlideTimeChange(+$any($event.target).value)">
        <span>{{ glideTime()* 1000 }}ms</span>
      </label>
    </div>

    <div class="oscillator-section">
      <h3>Oscillator 2</h3>
      <oscillator-selector
        [selectedType]="oscillator2Type()"
        (typeSelected)="onOscillator2TypeSelected($event)">
      </oscillator-selector>
      
      <div class="oscillator-controls">
        <label>
          Mix
          <input 
            type="range" 
            min="0" 
            max="1" 
            step="0.01"
            [value]="oscillator2Amount()"
            (input)="onOscillator2AmountChange(+$any($event.target).value)">
          <span>{{ (oscillator2Amount() * 100).toFixed(0) }}%</span>
        </label>

        <label for="oscillator2-sub-octave">Sub
          <input
            type="checkbox"
            id="oscillator2-sub-octave"
            [checked]="oscillator2SubOctave()"
            (change)="toggleOscillator2SubOctave()"
          />
        </label>

        <label for="oscillator2-invert">Invert
          <input
            type="checkbox"
            id="oscillator2-invert"
            [checked]="oscillator2Invert()"
            (change)="onOscillator2InvertChange()"
          />
        </label>
      </div>
    </div>
  </div>

  <div class="effects-controls">
    <div class="effect-section">
      <h3>Distortion</h3>
      <label>
        <input 
          type="checkbox" 
          [checked]="distortionEnabled()"
          (change)="toggleDistortion()">
        Enable
      </label>
      
      @if (distortionEnabled()) {
        <label>
          <input 
            type="checkbox" 
            [checked]="distortionFold()"
            (change)="toggleDistortionFold()">
          Fold
        </label>

        <label>
          Amount:
          <input 
            type="range" 
            min="0" 
            max="100" 
            [value]="distortionAmount()"
            (input)="onDistortionAmountChange(+$any($event.target).value)">
          <span>{{ distortionAmount() }}</span>
        </label>
      }
    </div>

    <div class="effect-section">
      <h3>Filter</h3>
      <label>
        <input 
          type="checkbox" 
          [checked]="filterEnabled()"
          (change)="toggleFilter()">
        Enable
      </label>
      
      @if (filterEnabled()) {
        <label>
          Type:
          <select 
            [value]="filterType()"
            (change)="onFilterTypeChange($event)">
            @for (type of filterTypes; track type) {
              <option [value]="type">{{ type }}</option>
            }
          </select>
        </label>

        <label>
          Frequency:
          <input 
            type="range" 
            min="0" 
            max="12000" 
            step="1"
            [value]="filterFrequency()"
            (input)="onFilterFrequencyChange(+$any($event.target).value)">
          <span>{{ filterFrequency().toFixed(0) }}Hz</span>
        </label>

        <label>
          Q:
          <input 
            type="range" 
            min="0.0001" 
            max="32" 
            step="0.1"
            [value]="filterQ()"
            (input)="onFilterQChange(+$any($event.target).value)">
          <span>{{ filterQ().toFixed(1) }}</span>
        </label>

        <label>
          Keyboard Tracking:
          <input 
            type="range" 
            min="0" 
            max="1" 
            step="0.01"
            [value]="filterKeyboardTracking()"
            (input)="onFilterKeyboardTrackingChange(+$any($event.target).value)">
          <span>{{ (filterKeyboardTracking() * 100).toFixed(0) }}%</span>
        </label>
      }
    </div>

    <div class="envelope-controls effect-section">
      <h3>Envelope (ADSR)</h3>
      
      <label>
        Attack:
        <input 
          type="range" 
          min="0.001" 
          max="0.5" 
          step="0.001"
          [value]="envelopeAttack()"
          (input)="onEnvelopeAttackChange(+$any($event.target).value)">
        <span>{{ (envelopeAttack() * 1000).toFixed(0) }}ms</span>
      </label>

      <label>
        Decay:
        <input 
          type="range" 
          min="0.001" 
          max="2" 
          step="0.001"
          [value]="envelopeDecay()"
          (input)="onEnvelopeDecayChange(+$any($event.target).value)">
        <span>{{ (envelopeDecay() * 1000).toFixed(0) }}ms</span>
      </label>

      <label>
        Sustain:
        <input 
          type="range" 
          min="0" 
          max="1" 
          step="0.01"
          [value]="envelopeSustain()"
          (input)="onEnvelopeSustainChange(+$any($event.target).value)">
        <span>{{ (envelopeSustain() * 100).toFixed(0) }}%</span>
      </label>

      <label>
        Release:
        <input 
          type="range" 
          min="0.001" 
          max="5" 
          step="0.001"
          [value]="envelopeRelease()"
          (input)="onEnvelopeReleaseChange(+$any($event.target).value)">
        <span>{{ (envelopeRelease() * 1000).toFixed(0) }}ms</span>
      </label>
    </div>

    <div class="effect-section">
      <h3>Delay</h3>
      <label>
        <input 
          type="checkbox" 
          [checked]="delayEnabled()"
          (change)="toggleDelay()">
        Enable
      </label>
      
      @if (delayEnabled()) {
        <label>
          Time:
          <input 
            type="range" 
            min="0.01" 
            max="2" 
            step="0.01"
            [value]="delayTime()"
            (input)="onDelayTimeChange(+$any($event.target).value)">
          <span>{{ delayTime().toFixed(2) }}s</span>
        </label>

        <label>
          Feedback:
          <input 
            type="range" 
            min="0" 
            max="0.95" 
            step="0.01"
            [value]="delayFeedback()"
            (input)="onDelayFeedbackChange(+$any($event.target).value)">
          <span>{{ (delayFeedback() * 100).toFixed(0) }}%</span>
        </label>

        <label>
          Mix:
          <input 
            type="range" 
            min="0" 
            max="1" 
            step="0.01"
            [value]="delayMix()"
            (input)="onDelayMixChange(+$any($event.target).value)">
          <span>{{ (delayMix() * 100).toFixed(0) }}%</span>
        </label>
      }
    </div>

    <div class="effect-section">
      <h3>Arpeggiator</h3>
      <label>
        <input 
          type="checkbox" 
          [checked]="arpeggiatorEnabled()"
          (change)="toggleArpeggiator()">
        Enable
      </label>
      
      @if (arpeggiatorEnabled()) {
        <label>
          Pattern:
          <input 
            type="text" 
            pattern="\d+"
            [value]="arpeggiatorPattern()"
            (input)="onArpeggiatorPatternChange($any($event.target).value)">
          <span>(semitones)</span>
        </label>

        <label>
          Tempo:
          <input 
            type="range" 
            min="20" 
            max="3000" 
            step="1"
            [value]="arpeggiatorTempo()"
            (input)="onArpeggiatorTempoChange(+$any($event.target).value)">
          <span>{{ arpeggiatorTempo() }} BPM</span>
        </label>
      }
    </div>
  </div>

  <div class="keyb-osc"> 
    <piano-keyboard
      [(currentOctave)]="currentOctave"
      (notePressed)="play($event.note, $event.octaveOffset)"
      (noteReleased)="stop()"
      (octaveChanged)="onOctaveChanged($event)"
      (oscillatorTypeToggled)="toggleOscillatorType()">
    </piano-keyboard>
  
    <osc-visualizer [analyser]="analyser"></osc-visualizer>
  </div>
</div>
